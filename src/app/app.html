<div class="min-h-screen bg-slate-100 px-4 py-10 transition dark:bg-slate-950">
  <div class="mx-auto max-w-4xl">
    <div
      class="rounded-[2rem] border border-white/70 bg-white/80 p-6 shadow-[0_30px_80px_-40px_rgba(15,23,42,0.45)] backdrop-blur dark:border-white/10 dark:bg-slate-900/70 dark:text-white"
    >
      <div class="mb-6 flex items-center justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-sky-600 dark:text-sky-400">
            NoteFlow
          </h1>
          <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
            Capture ideas, organize thoughts, and generate smart summaries.
          </p>
        </div>

        <button
          (click)="toggleDarkMode()"
          class="rounded-2xl bg-slate-200 px-4 py-2 text-sm font-semibold text-slate-800 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600"
        >
          {{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}
        </button>
      </div>

      <div class="relative mb-5">
        <input
          [(ngModel)]="searchTerm"
          placeholder="Search notes..."
          class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 pr-10 text-sm text-slate-900 outline-none transition focus:border-sky-400 focus:ring-4 focus:ring-sky-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white dark:focus:border-sky-500 dark:focus:ring-sky-500/20"
        />
      </div>

      <app-note-form
        [isSaving]="isSaving"
        (add)="addNote($event)"
      ></app-note-form>

      <app-note-list
        [notes]="filteredNotes"
        (delete)="deleteNote($event)"
        (update)="updateNote($event)"
        (pinToggle)="togglePin($event)"
        (summarize)="summarizeNote($event)"
      ></app-note-list>
    </div>
  </div>
</div>
