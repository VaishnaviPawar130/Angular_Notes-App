<div
  class="rounded-[1.75rem] border p-5 transition duration-200"
  [ngClass]="
    note.pinned
      ? 'border-amber-300 bg-amber-50 shadow-[0_18px_50px_-30px_rgba(217,119,6,0.55)] dark:border-amber-500/60 dark:bg-amber-950/40'
      : 'border-white/70 bg-white/85 shadow-[0_24px_60px_-34px_rgba(15,23,42,0.38)] hover:-translate-y-0.5 hover:shadow-[0_26px_70px_-34px_rgba(14,165,233,0.35)] dark:border-white/10 dark:bg-slate-900/75'
  "
>
  @if (isEditing) {
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
      <input
        [(ngModel)]="editedText"
        class="flex-1 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition focus:border-emerald-400 focus:ring-4 focus:ring-emerald-100 dark:border-slate-700 dark:bg-slate-950 dark:text-white dark:focus:border-emerald-500 dark:focus:ring-emerald-500/20"
      />

      <button
        type="button"
        (click)="saveEdit()"
        class="rounded-2xl bg-emerald-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-emerald-600"
      >
        Save
      </button>
    </div>
  } @else {
    <div class="flex items-start justify-between gap-3">
      <div class="flex-1">
        <div class="mb-3 flex flex-wrap items-center gap-2">
          @if (note.pinned) {
            <span
              class="rounded-full bg-amber-200 px-3 py-1 text-[11px] font-bold uppercase tracking-[0.2em] text-amber-900 dark:bg-amber-400/20 dark:text-amber-200"
            >
              Pinned
            </span>
          }

          <span class="text-xs font-medium text-slate-500 dark:text-slate-400">
            {{ note.createdAt | date: 'medium' }}
          </span>
        </div>

        <p class="whitespace-pre-wrap text-sm leading-6 text-slate-800 dark:text-slate-100">
          {{ note.text }}
        </p>
      </div>

      <div class="flex flex-wrap justify-end gap-2">
        <button
          type="button"
          (click)="togglePin()"
          class="rounded-full bg-slate-200 px-3 py-2 text-xs font-semibold text-slate-800 transition hover:bg-slate-300 dark:bg-slate-700 dark:text-slate-100 dark:hover:bg-slate-600"
        >
          {{ note.pinned ? 'Unpin' : 'Pin' }}
        </button>

        <button
          type="button"
          (click)="startEdit()"
          class="rounded-full bg-amber-400 px-3 py-2 text-xs font-semibold text-slate-950 transition hover:bg-amber-300"
        >
          Edit
        </button>

        <button
          type="button"
          (click)="deleteNote()"
          class="rounded-full bg-rose-500 px-3 py-2 text-xs font-semibold text-white transition hover:bg-rose-600"
        >
          Delete
        </button>

        <button
          type="button"
          (click)="onSummarize()"
          [disabled]="note.isSummarizing"
          class="rounded-full bg-sky-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-sky-700 disabled:cursor-not-allowed disabled:opacity-60"
        >
          @if (note.isSummarizing) {
            <span class="flex items-center gap-2">
              <span class="h-3.5 w-3.5 animate-spin rounded-full border-2 border-white border-t-transparent"></span>
              Summarizing...
            </span>
          } @else {
            Summarize
          }
        </button>
      </div>
    </div>
  }

  @if (note.isSummarizing) {
    <div
      class="mt-4 rounded-2xl border border-sky-100 bg-sky-50/80 p-4 text-sm text-slate-700 shadow-inner dark:border-sky-900/40 dark:bg-sky-950/30 dark:text-slate-200"
    >
      <p class="mb-2 text-[11px] font-bold uppercase tracking-[0.3em] text-sky-700 dark:text-sky-300">
        Summary
      </p>
      Generating summary...
    </div>
  }

  @if (!note.isSummarizing && note.aiSummary) {
    <div
      class="mt-4 whitespace-pre-line rounded-2xl border border-sky-100 bg-sky-50/80 p-4 text-sm text-slate-700 shadow-inner dark:border-sky-900/40 dark:bg-sky-950/30 dark:text-slate-200"
    >
      <p class="mb-2 text-[11px] font-bold uppercase tracking-[0.3em] text-sky-700 dark:text-sky-300">
        Summary
      </p>
      {{ note.aiSummary }}
    </div>
  }
</div>
